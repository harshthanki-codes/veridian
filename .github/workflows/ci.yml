name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install fastapi uvicorn pydantic xgboost scikit-learn shap numpy pandas \
                      pytest httpx python-dotenv

      - name: Run tests
        run: pytest --tb=short
